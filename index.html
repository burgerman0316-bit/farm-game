<!DOCTYPE html>
<html>
<head>
    <title>PRO FARM SIMULATOR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; color: #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s;
        }
        #bar-bg { width: 300px; height: 4px; background: #333; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.2s; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">
        <div style="font-size: 24px; font-weight: bold;">FARMING PRO</div>
        <div id="bar-bg"><div id="bar-fill"></div></div>
        <div id="status" style="margin-top: 10px; font-size: 12px; color: #aaa;">INITIALIZING...</div>
    </div>

    <div id="ui">
        <div>SPEED: <span id="speed">0</span> KM/H</div>
        <div style="font-size: 12px; opacity: 0.7;">WASD to Drive</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const bar = document.getElementById('bar-fill');
        const status = document.getElementById('status');

        // --- FAST LOAD SEQUENCE ---
        async function init() {
            // 1. Terrain (25%)
            bar.style.width = '25%';
            status.innerText = 'GENERATING FIELDS...';
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x355e3b })
            );
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // 2. Tractor (50%)
            await new Promise(r => setTimeout(r, 200)); // Small pause for visual
            bar.style.width = '50%';
            status.innerText = 'ASSEMBLING TRACTOR...';
            
            const tractor = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 2.5), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
            body.position.y = 0.8;
            tractor.add(body);
            
            // Wheels
            const wGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.4, 12);
            const wMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            [[1,0,1], [-1,0,1], [1,0,-1], [-1,0,-1]].forEach(pos => {
                const w = new THREE.Mesh(wGeo, wMat);
                w.rotation.z = Math.PI/2;
                w.position.set(pos[0]*0.8, 0.6, pos[2]*1);
                tractor.add(w);
            });
            scene.add(tractor);

            // 3. Environment (75%)
            bar.style.width = '75%';
            status.innerText = 'LIGHTING WORLD...';
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

            // 4. Ready (100%)
            bar.style.width = '100%';
            status.innerText = 'READY!';
            await new Promise(r => setTimeout(r, 300));
            
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 500);

            // --- GAME LOOP ---
            let vel = 0, rot = 0;
            const keys = {};
            window.onkeydown = (e) => keys[e.code] = true;
            window.onkeyup = (e) => keys[e.code] = false;

            function animate() {
                requestAnimationFrame(animate);
                
                if (keys['KeyW']) vel += 0.01;
                if (keys['KeyS']) vel -= 0.01;
                if (keys['KeyA']) rot += 0.03;
                if (keys['KeyD']) rot -= 0.03;
                
                vel *= 0.95; // Drag
                tractor.rotation.y = rot;
                tractor.position.x += Math.sin(rot) * vel;
                tractor.position.z += Math.cos(rot) * vel;

                camera.position.lerp(new THREE.Vector3(
                    tractor.position.x - Math.sin(rot) * 10,
                    tractor.position.y + 5,
                    tractor.position.z - Math.cos(rot) * 10
                ), 0.1);
                camera.lookAt(tractor.position);

                document.getElementById('speed').innerText = Math.round(Math.abs(vel * 100));
                renderer.render(scene, camera);
            }
            animate();
        }

        init();
    </script>
</body>
</html>
