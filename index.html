<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Pro Farm Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #555; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin-top:0; color: #ffcc00;">FARMLAND SIM</h2>
        <div>🚜 Gear: <span id="gear">N</span></div>
        <div>🏁 Speed: <span id="speed">0</span> km/h</div>
        <hr>
        <small>WASD - Drive | SPACE - Handbrake | C - Camera</small>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- WORLD GENERATION (The Field) ---
        const floorGeo = new THREE.PlaneGeometry(300, 300);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 }); // Deep grass
        const ground = new THREE.Mesh(floorGeo, floorMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Add a "Plowed Field" Texture Area
        const fieldGeo = new THREE.PlaneGeometry(50, 80);
        const fieldMat = new THREE.MeshStandardMaterial({ color: 0x4b3621, roughness: 1 });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI / 2;
        field.position.set(0, 0.02, 0); // Slightly above ground to avoid flickering
        scene.add(field);

        // --- DETAILED TRACTOR ---
        const tractor = new THREE.Group();
        
        // Chassis & Hood
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.2, 2.8), new THREE.MeshStandardMaterial({ color: 0x008000 })); // John Deere Green
        body.position.y = 1.2;
        body.castShadow = true;
        tractor.add(body);

        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.4, 1.3), new THREE.MeshStandardMaterial({ color: 0x222222, transparent: true, opacity: 0.8 }));
        cabin.position.set(0, 2.3, -0.4);
        tractor.add(cabin);

        // Big Back Wheels
        const bWheelGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.6, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const rw = new THREE.Mesh(bWheelGeo, wheelMat); rw.rotation.z = Math.PI/2; rw.position.set(1, 0.8, -0.8);
        const lw = new THREE.Mesh(bWheelGeo, wheelMat); lw.rotation.z = Math.PI/2; lw.position.set(-1, 0.8, -0.8);
        tractor.add(rw, lw);

        // Small Front Wheels
        const fWheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 16);
        const frw = new THREE.Mesh(fWheelGeo, wheelMat); frw.rotation.z = Math.PI/2; frw.position.set(0.8, 0.5, 1);
        const flw = new THREE.Mesh(fWheelGeo, wheelMat); flw.rotation.z = Math.PI/2; flw.position.set(-0.8, 0.5, 1);
        tractor.add(frw, flw);

        scene.add(tractor);

        // --- DRIVE PHYSICS ---
        let velocity = 0;
        let rotation = 0;
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updatePhysics() {
            if (keys['KeyW']) velocity += 0.008;
            if (keys['KeyS']) velocity -= 0.008;
            if (keys['Space']) velocity *= 0.85; // Brakes

            if (Math.abs(velocity) > 0.01) {
                const turnFactor = velocity > 0 ? 1 : -1;
                if (keys['KeyA']) rotation += 0.025 * turnFactor;
                if (keys['KeyD']) rotation -= 0.025 * turnFactor;
            }

            velocity *= 0.97; // Drag
            tractor.rotation.y = rotation;
            tractor.position.x += Math.sin(rotation) * velocity;
            tractor.position.z += Math.cos(rotation) * velocity;

            // UI Stats
            document.getElementById('speed').innerText = Math.abs(Math.round(velocity * 120));
            document.getElementById('gear').innerText = velocity > 0.01 ? "D" : (velocity < -0.01 ? "R" : "N");
        }

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();

            // Smooth Follow Camera
            const cameraOffset = new THREE.Vector3(0, 5, -12).applyMatrix4(tractor.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(tractor.position.x, tractor.position.y + 1, tractor.position.z);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
