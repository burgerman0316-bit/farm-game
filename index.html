<!DOCTYPE html>
<html>
<head>
    <title>PRO FARM SIMULATOR 2024</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* --- UPDATED LOADING SCREEN --- */
        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #050505; color: #0f0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; 
        }
        #load-status { margin-bottom: 15px; font-size: 18px; letter-spacing: 2px; }
        #progress-container { 
            width: 300px; height: 10px; border: 1px solid #0f0; padding: 2px; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); 
        }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #percent { margin-top: 10px; font-size: 12px; }

        #overlay { position: absolute; bottom: 20px; right: 20px; color: #0f0; background: rgba(0,20,0,0.8); padding: 15px; border: 1px solid #0f0; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; color: white; transform: translate(-50%, -50%); font-size: 20px; }
        .stat-line { display: flex; justify-content: space-between; width: 250px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="loading">
        <div id="load-status">BOOTING FARM_OS...</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="percent">0%</div>
    </div>
    
    <div id="crosshair">+</div>
    <div id="overlay">
        <div class="stat-line"><span>ENGINE_RPM:</span><span id="rpm">0</span></div>
        <div class="stat-line"><span>SPEED_KMH:</span><span id="speed">0</span></div>
        <div class="stat-line"><span>GEAR_SEL:</span><span id="gear">P</span></div>
        <div class="stat-line"><span>FUEL_LVL:</span><span>98%</span></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- PROGRESS BAR LOGIC ---
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const statusText = document.getElementById('load-status');
        
        let progress = 0;
        function updateProgress(val, status) {
            progress = val;
            progressBar.style.width = `${progress}%`;
            percentText.innerText = `${Math.round(progress)}%`;
            if (status) statusText.innerText = status;
        }

        // --- STEP 1: GENERATE TRACTOR (20%) ---
        updateProgress(10, "INITIALIZING VEHICLE ASSETS...");
        const vehicle = new THREE.Group();
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1, 3), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
        chassis.position.y = 1.2; chassis.castShadow = true;
        vehicle.add(chassis);
        // ... (Adding Cabin, Hood, Exhaust as before)
        
        const wheels = [];
        const createWheel = (x, y, z, radius, width, steerable) => {
            const group = new THREE.Group(); group.position.set(x, y, z);
            const w = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, width, 24), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            w.rotation.z = Math.PI / 2; w.castShadow = true;
            group.add(w); vehicle.add(group);
            return { mesh: group, inner: w, steerable };
        };
        wheels.push(createWheel(1.1, 1, -1, 1, 0.6, false));
        wheels.push(createWheel(-1.1, 1, -1, 1, 0.6, false));
        wheels.push(createWheel(0.9, 0.6, 1.2, 0.6, 0.4, true));
        wheels.push(createWheel(-0.9, 0.6, 1.2, 0.6, 0.4, true));
        scene.add(vehicle);
        updateProgress(30, "VEHICLE RIGGED.");

        // --- STEP 2: GENERATE TERRAIN (40%) ---
        updateProgress(45, "PLANNING CROP FIELDS...");
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x244211 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);
        
        // --- STEP 3: CROP PLACEMENT (80%) ---
        // Simulated heavy task with delay
        let cropLoad = 0;
        const totalCrops = 100;
        const cropInterval = setInterval(() => {
            cropLoad++;
            updateProgress(45 + (cropLoad/totalCrops)*35, `PLANTING SEEDS... [${cropLoad}/${totalCrops}]`);
            if (cropLoad >= totalCrops) {
                clearInterval(cropInterval);
                finishLoading();
            }
        }, 15);

        // --- LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun, new THREE.AmbientLight(0x404040, 0.6));

        // --- PHYSICS ---
        let vel = 0, steer = 0, rotation = 0;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function finishLoading() {
            updateProgress(100, "SYSTEM READY.");
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                animate();
            }, 800);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // Movement Logic
            if (keys['KeyW']) vel += 12 * delta;
            if (keys['KeyS']) vel -= 8 * delta;
            if (keys['Space']) vel *= 0.9;
            vel *= 0.98;

            const maxSteer = 0.5;
            if (keys['KeyA']) steer += 2 * delta;
            else if (keys['KeyD']) steer -= 2 * delta;
            else steer *= 0.9;
            steer = Math.max(-maxSteer, Math.min(maxSteer, steer));

            wheels.forEach(w => {
                if (w.steerable) w.mesh.rotation.y = steer;
                w.inner.rotation.x -= vel * 0.1;
            });

            rotation += steer * vel * 0.01;
            vehicle.rotation.y = rotation;
            vehicle.position.x += Math.sin(rotation) * vel * delta * 10;
            vehicle.position.z += Math.cos(rotation) * vel * delta * 10;

            // Follow Camera
            const camTarget = new THREE.Vector3(0, 5, -12).applyMatrix4(vehicle.matrixWorld);
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(vehicle.position.x, vehicle.position.y + 2, vehicle.position.z);

            // UI
            document.getElementById('speed').innerText = Math.abs(Math.round(vel * 5));
            document.getElementById('rpm').innerText = Math.round(1000 + Math.abs(vel * 200));

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
